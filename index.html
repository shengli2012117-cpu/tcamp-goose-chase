<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Tcamp 鹅追击</title>
<style>
  body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { border: 2px solid #444; cursor: pointer; user-select: none; -webkit-user-select: none; }
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800, H = 600;
const GROUND_Y = 500;
const PLAYER_SIZE = 32;
const GOOSE_SIZE = 36;
const BASE_SPEED = 1.8;
const SPEED_CAP = 3.0;
const SPAWN_AHEAD = 1200;
const DESPAWN_BEHIND = 800;

// --- Game state ---
let player, goose, camera, gameState, countdownTimer;
let obstacles = [], coins = [];
let speedTier, distanceScore, coinScore, coinCount, score;
let lastObstacleX, generatorIndex;
let jumpRequested, spaceWasDown;
let particles, popups, trailParticles;
let combo, screenShake, highScore, comboFx, comboShake;
let playerSpeed;

// --- Run statistics ---
let runStats = {}; // { jumps, maxCombo, jumpsUsed, wallHits, pitsFallen, coinsCollected }
let leaderboard = []; // [{ name, score, dist, date }]
let leaderboardState = 'hidden'; // 'hidden' | 'input' | 'shown'
let lbNameInput = '';

try { highScore = parseInt(localStorage.getItem('tcampHighScore')) || 0; } catch(e) { highScore = 0; }
try { leaderboard = JSON.parse(localStorage.getItem('tcampLB') || '[]'); } catch(e) { leaderboard = []; }

function getRank(dist) {
  if (dist >= 5000) return { name: '传说', color: '#ff4444', emoji: '👑' };
  if (dist >= 3000) return { name: '大师', color: '#e040fb', emoji: '💎' };
  if (dist >= 1500) return { name: '达人', color: '#42a5f5', emoji: '⭐' };
  if (dist >= 500)  return { name: '跑者', color: '#4caf50', emoji: '🏃' };
  return { name: '萌新', color: '#aaa', emoji: '🐣' };
}

// --- Wave pattern: sprint (dense) ⇄ reward (sparse + coins) ---
function generateWave(lastX, waveIdx) {
  const isSprint = waveIdx % 3 !== 2; // 2 sprint waves → 1 reward wave
  const obs = [];
  let curX, gap, breathGap, count;
  const isReward = !isSprint;

  if (isSprint) {
    breathGap = 380;
    gap = Math.max(240, 400 - waveIdx * 8);
    count = 3 + Math.floor(Math.random() * (2 + Math.floor(waveIdx / 10)));
    curX = lastX + breathGap;
    for (let i = 0; i < count; i++) {
      const types = ['small','small','small','small','tall','small','beam','small'];
      const type = types[Math.floor(Math.random()*types.length)];
      let w=28, h=22, y=GROUND_Y-22;
      if (type==='tall') { h=44; y=GROUND_Y-44; w=30; }
      if (type==='beam') { h=14; y=GROUND_Y-34; w=50+Math.floor(Math.random()*15); }
      obs.push({x:curX, y, w, h, type, cleared:false, reward:false});
      curX += gap + Math.floor(Math.random()*40);
    }
  } else {
    // Reward zone: sparse, extra coins marker
    breathGap = 600;
    gap = 500;
    count = 1 + Math.floor(Math.random()*2);
    curX = lastX + breathGap;
    for (let i = 0; i < count; i++) {
      obs.push({x:curX, y:GROUND_Y-22, w:28, h:22, type:'small', cleared:false, reward:true});
      curX += gap;
    }
  }
  return { obstacles: obs, endX: curX, reward: isReward };
}

// --- Spawn coins around a group of obstacles ---
function spawnCoinsForObstacles(obs, isReward) {
  const newCoins = [];
  for (const o of obs) {
    if (isReward) {
      for (let dx = -60; dx <= 70; dx += 18) {
        newCoins.push({ x: o.x + dx, y: GROUND_Y - 40 - Math.abs(dx) * 0.3, collected: false });
      }
    } else if (o.type === 'beam') {
      newCoins.push({ x: o.x + 10, y: GROUND_Y - 20, collected: false });
      newCoins.push({ x: o.x + 25, y: GROUND_Y - 20, collected: false });
    } else {
      newCoins.push({ x: o.x - 50, y: GROUND_Y - 40, collected: false });
      newCoins.push({ x: o.x + 5, y: GROUND_Y - (o.type === 'tall' ? 90 : 70), collected: false });
    }
  }
  return newCoins;
}

// ===================== RESET =====================
function reset() {
  playerSpeed = BASE_SPEED;
  player = {
    x: 100, y: GROUND_Y - PLAYER_SIZE, w: PLAYER_SIZE, h: PLAYER_SIZE,
    vy: 0, onGround: true, runFrame: 0, coyoteTimer: 0,
    doubleJumped: false,
    sliding: false, slideTimer: 0, holdingSlide: false,
    jumpHeld: false, jumpsUsed: 0,
    stumble: 0, pitFalling: 0
  };
  goose = { x: -160, y: GROUND_Y - GOOSE_SIZE, w: GOOSE_SIZE, h: GOOSE_SIZE };
  player._lastMilestone = 0;
  camera = { x: 0 };
  gameState = 'waiting';
  countdownTimer = 0;
  jumpRequested = 0;
  spaceWasDown = false;
  speedTier = 0;
  distanceScore = 0;
  coinScore = 0;
  coinCount = 0;
  score = 0;
  combo = 0;
  screenShake = 0;
  generatorIndex = 0;
  lastObstacleX = 400;
  obstacles = [];
  coins = [];
  particles = [];
  popups = [];
  trailParticles = [];
  leaderboardState = 'hidden';
  lbNameInput = '';

  runStats = { jumps: 0, maxCombo: 0, wallHits: 0, pitsFallen: 0, coinsCollected: 0, dist: 0 };

  // Pre-generate first 2 waves
  for (let w = 0; w < 2; w++) {
    const wave = generateWave(lastObstacleX, generatorIndex);
    obstacles.push(...wave.obstacles);
    coins.push(...spawnCoinsForObstacles(wave.obstacles, wave.reward));
    lastObstacleX = wave.endX;
    generatorIndex++;
  }
}

function addPopup(x, y, text, color) {
  popups.push({ x, y, text, color, life: 40, vy: -2 });
}
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 1) * 8, life: 40 + Math.random() * 20, color, size: 2 + Math.random() * 4, type: 'dot' });
  }
}
function spawnFlames(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({ x: x + (Math.random() - 0.5) * 60, y: y + (Math.random() - 0.5) * 30, vx: (Math.random() - 0.5) * 3, vy: -(2 + Math.random() * 5), life: 25 + Math.random() * 20, color: '#ff' + ['4400', '6600', '8800', 'aa00'][i % 4], size: 4 + Math.random() * 6, type: 'flame' });
  }
}

// ===================== INPUT =====================
const keys = {};
window.addEventListener('keydown', e => {
  // Leaderboard name input
  if (gameState === 'over' && leaderboardState === 'input') {
    if (e.key === 'r' || e.key === 'R') { reset(); e.preventDefault(); return; }
    if (e.key === 'Enter') {
      submitLeaderboard();
      leaderboardState = 'shown';
      e.preventDefault(); return;
    }
    if (e.key === 'Escape') { leaderboardState = 'hidden'; e.preventDefault(); return; }
    if (e.key === 'Backspace') { lbNameInput = lbNameInput.slice(0, -1); e.preventDefault(); return; }
    if (e.key.length === 1 && lbNameInput.length < 12) { lbNameInput += e.key; e.preventDefault(); return; }
    e.preventDefault(); return;
  }

  // Can always reset
  if (e.key === 'r' || e.key === 'R') { reset(); e.preventDefault(); return; }

  keys[e.key] = true;
  if (gameState === 'waiting' && (e.key === ' ' || e.key === 'Space')) { gameState = 'countdown'; countdownTimer = 90; }
  if ((e.key === ' ' || e.key === 'Space') && gameState === 'playing') {
    player.jumpHeld = true;
    if (!spaceWasDown) jumpRequested = Math.min(jumpRequested + 1, 2);
    spaceWasDown = true;
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  if ((e.key === ' ' || e.key === 'Space')) {
    spaceWasDown = false;
    if (gameState === 'playing') { player.jumpHeld = false; if (player.vy < -3) player.vy = -3; }
  }
  e.preventDefault();
});
canvas.addEventListener('click', () => {
  if (gameState === 'waiting') { gameState = 'countdown'; countdownTimer = 90; }
  if (gameState === 'playing') jumpRequested = Math.min(jumpRequested + 1, 2);
});

// ===================== COLLISION =====================
function collides(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

// ===================== UPDATE =====================
function update() {
  for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; if (p.life <= 0) particles.splice(i, 1); }
  for (let i = popups.length - 1; i >= 0; i--) { const p = popups[i]; p.y += p.vy; p.life--; if (p.life <= 0) popups.splice(i, 1); }

  if (gameState === 'countdown') { countdownTimer--; if (countdownTimer <= 0) gameState = 'playing'; return; }
  if (gameState !== 'playing') return;

  // ---- Speed ramp: +0.12 every 500m, no cap ----
  const distInHundreds = Math.floor(player.x / 500);
  if (distInHundreds > speedTier) {
    speedTier = distInHundreds;
    playerSpeed = Math.min(SPEED_CAP, BASE_SPEED + speedTier * 0.10);
    if (playerSpeed < SPEED_CAP - 0.01) {
      addPopup(player.x, player.y - 40, '加速! ×' + playerSpeed.toFixed(1), '#ffcc00');
    }
  }

  // ---- Procedural generation: ensure obstacles exist ahead ----
  const viewRight = camera.x + W + SPAWN_AHEAD;
  while (lastObstacleX < viewRight) {
    const wave = generateWave(lastObstacleX, generatorIndex);
    obstacles.push(...wave.obstacles);
    coins.push(...spawnCoinsForObstacles(wave.obstacles, wave.reward));
    lastObstacleX = wave.endX;
    generatorIndex++;
  }
  // Cleanup: remove obstacles far behind
  const cleanX = camera.x - DESPAWN_BEHIND;
  obstacles = obstacles.filter(o => o.x + o.w > cleanX);
  coins = coins.filter(c => c.collected || c.x > cleanX - 100);

  // ---- Player movement ----
  const effectiveSpeed = player.stumble > 0 ? playerSpeed * 0.3 : playerSpeed;
  player.x += effectiveSpeed;
  player.runFrame++;
  distanceScore = Math.floor(player.x / 10);
  score = distanceScore + coinScore;

  // Pit falling
  if (player.pitFalling > 0) {
    player.pitFalling--;
    player.vy += 0.3; player.y += player.vy;
    spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 1);
    if (player.pitFalling <= 0) { saveHighScore(); gameState = 'over'; }
    return;
  }

  // Slide
  const sDown = (keys['s'] || keys['S']);
  if (sDown && player.onGround && !player.sliding) { player.sliding = true; player.slideTimer = 36; }
  player.holdingSlide = sDown;
  if (player.sliding) {
    player.slideTimer--;
    player.h = 16; player.y = GROUND_Y - player.h;
    if (player.holdingSlide && player.slideTimer < 6) player.slideTimer = 6;
    if (player.slideTimer <= 0) { player.sliding = false; player.h = PLAYER_SIZE; player.y = GROUND_Y - player.h; }
  } else if (player.onGround) { player.h = PLAYER_SIZE; }

  // Jump system (buffer-based)
  while (jumpRequested > 0 && player.jumpsUsed < 2) {
    const power = player.jumpsUsed === 0 ? -12 : -9;
    player.vy = power; player.onGround = false; player.coyoteTimer = 0;
    player.doubleJumped = (player.jumpsUsed === 1);
    player.jumpHeld = true; player.jumpsUsed++; jumpRequested--;
    if (player.jumpsUsed === 2) {
      spawnParticles(player.x + player.w/2, player.y + player.h, '#fff', 12);
      addPopup(player.x, player.y - 20, '二段跳!', '#90caf9');
    }
    runStats.jumps++;
  }

  if (!player.jumpHeld && player.vy < -3) player.vy = -3;
  player.vy += 0.45; player.y += player.vy;

  // Ground collision
  if (player.y >= GROUND_Y - player.h) {
    player.y = GROUND_Y - player.h; player.vy = 0;
    player.onGround = true; player.coyoteTimer = 0;
    player.jumpsUsed = 0; player.doubleJumped = false;
    if (!player.sliding) player.h = PLAYER_SIZE;
  } else if (player.onGround && player.vy > 0) { player.onGround = false; player.coyoteTimer = 7; }

  // Coyote time
  if (jumpRequested > 0 && player.jumpsUsed === 0 && player.coyoteTimer > 0) {
    player.vy = -12; player.onGround = false; player.coyoteTimer = 0;
    player.doubleJumped = false; player.jumpHeld = true; player.jumpsUsed = 1; jumpRequested--;
  }
  if (player.coyoteTimer > 0 && player.jumpsUsed > 0) player.coyoteTimer--;
  if (player.coyoteTimer > 0 && player.jumpsUsed === 0) player.coyoteTimer--;

  // Pit detection
  for (const obs of obstacles) {
    if (obs.type !== 'pit') continue;
    const pHoriz = player.x + player.w > obs.x && player.x < obs.x + obs.w;
    if (pHoriz && player.y >= GROUND_Y - player.h && player.vy >= 0 && player.pitFalling === 0) {
      player.pitFalling = 45; player.vy = 0;
      runStats.pitsFallen++;
    }
  }

  // Coin collection
  for (const coin of coins) {
    if (coin.collected) continue;
    const cBox = { x: coin.x - 8, y: coin.y - 8, w: 16, h: 16 };
    if (collides(player, cBox)) {
      coin.collected = true; coinScore += 10; coinCount++;
      runStats.coinsCollected++;
      addPopup(coin.x, coin.y - 10, '+10', '#ffcc00');
      spawnParticles(coin.x, coin.y, '#ffd700', 6);
    }
  }

  // Combo detection + escalation effects
  const comboBefore = combo;
  for (const obs of obstacles) {
    if (obs.cleared) continue;
    if (obs.type === 'pit') { if (player.x > obs.x + obs.w + 40) obs.cleared = true; continue; }
    if (player.x > obs.x + obs.w + 40) {
      obs.cleared = true; combo++;
      if (combo > runStats.maxCombo) runStats.maxCombo = combo;
    }
  }
  // Escalate bonus at breakpoints (fired only once per threshold)
  if (combo > comboBefore) {
    const prevBonus = comboBefore >= 20 ? 20 : comboBefore >= 10 ? 10 : comboBefore >= 5 ? 5 : 0;
    const newBonus  = combo        >= 20 ? 20 : combo        >= 10 ? 10 : combo        >= 5 ? 5 : 0;
    const baseScore = combo * 3;
    coinScore += baseScore; score = distanceScore + coinScore;
    addPopup(player.x, player.y - 30, '+' + baseScore, '#ffcc00');

    // === Escalation pop effect (fires once when threshold crossed) ===
    if (newBonus > prevBonus) {
      comboFx = { timer: 120, tier: newBonus === 20 ? 3 : newBonus === 10 ? 2 : 1 };
      comboShake = newBonus === 20 ? 25 : newBonus === 10 ? 10 : 0;
      if (newBonus === 20) {
        // RED TIER: 50 particles + 12 flames + screen flash + goose recoil
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 30);
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ffcc00', 12);
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ffffff', 8);
        spawnFlames(player.x + player.w/2, player.y, 12);
        goose.x = Math.max(-500, goose.x - 40);
        spawnParticles(goose.x + goose.w/2, goose.y + goose.h/2, '#ffcc00', 8);
      } else if (newBonus === 10) {
        // GOLD TIER: 20 particles spiral + corners pulse
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ffaa00', 15);
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ffcc00', 8);
        goose.x = Math.max(-500, goose.x - 15);
      } else {
        // GREEN TIER: 12 particles
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#4caf50', 8);
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ffffff', 4);
      }
    }
  }

  // Combo-break: when player hits a wall while having a combo going
  if (player.stumble > 0 && comboBefore >= 5) {
    coinScore -= Math.floor(comboBefore * 2); // small penalty
    score = distanceScore + coinScore;
    addPopup(player.x, player.y - 40, 'Combo Lost!', '#888');
    spawnParticles(player.x + player.w/2, player.y + player.h/2, '#888', 6);
    comboFx = null;
    combo = 0;
  }

  // Tick down combo effect timer
  if (comboFx) {
    comboFx.timer--;
    if (comboFx.timer <= 0) comboFx = null;
  }
  if (comboShake > 0) comboShake = Math.max(0, comboShake - 0.8);

  // Milestones every 100m
  const milestone = Math.floor(player.x / 1000) * 100;
  if (milestone >= 100) {
    if (!player._lastMilestone) player._lastMilestone = 0;
    if (milestone > player._lastMilestone) {
      player._lastMilestone = milestone;
      addPopup(player.x, player.y - 55, milestone + 'm! 🏃', '#00e676');
      spawnParticles(player.x, player.y, '#00e676', 15);
    }
  }

  // Trail particles
  if (player.onGround && !player.sliding && player.stumble <= 0) {
    const trailRate = 0.35 + (playerSpeed - BASE_SPEED) * 0.15;
    if (Math.random() < trailRate) trailParticles.push({ x: player.x - 4, y: player.y + player.h - 4, life: 12 + Math.random() * 14, size: 1.5 + Math.random() * 3 });
  }
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    trailParticles[i].life--; trailParticles[i].x -= 0.3 + Math.random() * 0.5;
    if (trailParticles[i].life <= 0) trailParticles.splice(i, 1);
  }

  // Camera
  const targetCamX = player.x - W / 3;
  camera.x += (targetCamX - camera.x) * 0.12;
  if (camera.x < 0) camera.x = 0;

  // Obstacle collision → stumble
  if (player.stumble <= 0) {
    for (const obs of obstacles) {
      if (obs.type === 'pit') continue;
      const margin = 6;
      const pBox = { x: player.x + margin, y: player.y + margin, w: player.w - margin*2, h: player.h - margin*2 };
      let oBox;
      if (obs.type === 'beam') { if (player.sliding) continue; oBox = { x: obs.x + 2, y: obs.y + 1, w: obs.w - 4, h: obs.h - 1 }; }
      else { oBox = { x: obs.x + 3, y: obs.y + 2, w: obs.w - 6, h: obs.h - 2 }; }
      if (collides(pBox, oBox)) {
        player.stumble = 18; player.x = Math.max(100, player.x - 20);
        player.y = GROUND_Y - player.h; player.vy = -3; player.onGround = false;
        runStats.wallHits++;
        // DDA: one mistake drops speed by 2 tiers — gives breathing room
        speedTier = Math.max(0, speedTier - 2);
        playerSpeed = Math.min(SPEED_CAP, BASE_SPEED + speedTier * 0.10);
        spawnParticles(player.x + player.w/2, player.y + player.h, '#ff8844', 12);
        addPopup(player.x, player.y - 20, '降速! ×' + playerSpeed.toFixed(1), '#ff8844');
        break;
      }
    }
  }
  if (player.stumble > 0) player.stumble--;

  // Goose rubber-band chase
  const gooseDist = player.x - goose.x;
  // Goose: 82% at start → 96% at speed cap. Slight gap always remains.
  const chaseRatio = 0.82 + Math.min(playerSpeed / SPEED_CAP, 1) * 0.14;
  const gooseSpeed = player.stumble > 0 ? playerSpeed : effectiveSpeed * chaseRatio;
  goose.x += gooseSpeed;

  screenShake = gooseDist < 100 ? Math.min(10, 100 - gooseDist) : Math.max(0, screenShake - 0.5);

  if (gooseDist < 8) { spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 50); saveHighScore(); gameState = 'over'; return; }
}

function saveHighScore() {
  runStats.dist = distanceScore;
  if (score > highScore) { highScore = score; try { localStorage.setItem('tcampHighScore', highScore); } catch(e) {} }
  // If run was too short, just show simple over screen
  if (distanceScore < 50) { leaderboardState = 'hidden'; return; }
  // Check if qualifies for leaderboard entry
  const minQualify = leaderboard.length < 10 ? -1 : (leaderboard[leaderboard.length-1]||{dist:-1}).dist;
  if (distanceScore > minQualify) {
    leaderboardState = 'input';
    lbNameInput = '';
  } else {
    leaderboardState = 'shown'; // show leaderboard, no input needed
  }
}

function submitLeaderboard() {
  const name = lbNameInput.trim() || '无名';
  leaderboard.push({ name, score, dist: distanceScore, date: new Date().toLocaleDateString() });
  leaderboard.sort((a, b) => b.dist - a.dist);
  leaderboard = leaderboard.slice(0, 10);
  try { localStorage.setItem('tcampLB', JSON.stringify(leaderboard)); } catch(e) {}
  leaderboardState = 'shown';
}

// ===================== RENDER =====================
function draw() {
  ctx.clearRect(0, 0, W, H);
  // Sky — shifts color palette every 1500m
  const skyTheme = Math.floor(distanceScore / 1500);
  const themes = [
    { top: '#0a0a1a', mid: '#1a1a3e', bot: '#3a2a5c', stars: '#ffffff33', mountain: '#1e1e3a' },   // 深夜 0-1500m
    { top: '#1a1030', mid: '#2a1a4e', bot: '#4a3060', stars: '#ffffff33', mountain: '#2a1e4a' },   // 紫夜 1500-3000m
    { top: '#0a2a4a', mid: '#1a3a5e', bot: '#3a5a7c', stars: '#ffffff22', mountain: '#1e3a5a' },   // 黎明 3000-4500m
    { top: '#3a1a2a', mid: '#5a2a4a', bot: '#7a3a5a', stars: '#ffffff33', mountain: '#4a1e3a' },   // 赤夜 4500-6000m
    { top: '#0a0a2a', mid: '#1a1a5a', bot: '#2a2a8a', stars: '#ffffff44', mountain: '#1a1a5a' },   // 极夜 6000m+
  ];
  const th = themes[skyTheme % themes.length];
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, th.top); sky.addColorStop(0.5, th.mid); sky.addColorStop(1, th.bot);
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // Parallax stars (tileable)
  ctx.save(); ctx.translate(-(camera.x * 0.3 % 800), 0);
  ctx.fillStyle = th.stars;
  for (let i = 0; i < 60; i++) ctx.fillRect(((i * 137 + 42) % 800), ((i * 251 + 42) % (GROUND_Y - 60)), 2, 2);
  for (let i = 0; i < 60; i++) ctx.fillRect(((i * 137 + 42) % 800) + 800, ((i * 251 + 42) % (GROUND_Y - 60)), 2, 2);
  ctx.restore();

  // Parallax mountains (tileable)
  ctx.save(); ctx.translate(-(camera.x * 0.5 % 1000), 0);
  ctx.fillStyle = th.mountain;
  for (let i = 0; i < 10; i++) { const mx = i * 500; ctx.beginPath(); ctx.moveTo(mx - 120, GROUND_Y); ctx.lineTo(mx + 60, GROUND_Y - 180); ctx.lineTo(mx + 240, GROUND_Y); ctx.fill(); }
  ctx.restore();

  // Visible range
  const visLeft = camera.x - 100, visRight = camera.x + W + 100;
  ctx.save(); ctx.translate(-camera.x, 0);

  // Ground (segment, just draw the visible portion)
  ctx.fillStyle = '#2a2a4a'; ctx.fillRect(visLeft, GROUND_Y, visRight - visLeft, H - GROUND_Y);
  ctx.fillStyle = '#3d3d6b'; ctx.fillRect(visLeft, GROUND_Y, visRight - visLeft, 4);
  ctx.strokeStyle = '#333360'; ctx.lineWidth = 1;
  for (let gx = Math.floor(visLeft / 80) * 80; gx < visRight; gx += 80) {
    ctx.beginPath(); ctx.moveTo(gx, GROUND_Y + 4); ctx.lineTo(gx, GROUND_Y + 4 + ((gx / 80) % 3 === 0 ? 24 : 12)); ctx.stroke();
  }

  // Reward zone ground glow
  for (const obs of obstacles) {
    if (obs.reward && obs.x + obs.w > visLeft && obs.x < visRight) {
      const rl = Math.max(visLeft, obs.x - 70), rr = Math.min(visRight, obs.x + obs.w + 70);
      const grd = ctx.createLinearGradient(0, GROUND_Y, 0, GROUND_Y + 20);
      grd.addColorStop(0, '#ffd70022'); grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd; ctx.fillRect(rl, GROUND_Y, rr - rl, 20);
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
      ctx.fillText('🎁 奖励区 🎁', obs.x + obs.w/2, GROUND_Y - 18);
    }
  }

  // Obstacles
  for (const obs of obstacles) {
    if (obs.x + obs.w < visLeft || obs.x > visRight) continue;
    if (obs.type === 'pit') {
      ctx.fillStyle = '#0a0a0a'; ctx.fillRect(obs.x, GROUND_Y, obs.w, H - GROUND_Y);
      ctx.fillStyle = '#ff444466'; ctx.fillRect(obs.x, GROUND_Y, 3, H - GROUND_Y); ctx.fillRect(obs.x + obs.w - 3, GROUND_Y, 3, H - GROUND_Y);
      ctx.fillStyle = '#ff4444'; ctx.font = '18px monospace'; ctx.textAlign = 'center';
      ctx.fillText('▼ 坑 ▼', obs.x + obs.w/2, GROUND_Y - 10 + Math.sin(Date.now() * 0.005) * 4);
    } else if (obs.type === 'beam') {
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(obs.x + 2, obs.y + 2, obs.w, obs.h);
      ctx.fillStyle = '#7b1fa2'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = '#e040fb'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = '#4a0072'; const bsw = 8;
      for (let sx = obs.x; sx < obs.x + obs.w; sx += bsw * 2) ctx.fillRect(sx, obs.y, Math.min(bsw, obs.x + obs.w - sx), obs.h);
      ctx.fillStyle = '#e040fb';
      for (let sx = obs.x + 5; sx < obs.x + obs.w - 5; sx += 12) {
        ctx.beginPath(); ctx.moveTo(sx, obs.y + obs.h); ctx.lineTo(sx + 4, obs.y + obs.h + 10); ctx.lineTo(sx + 8, obs.y + obs.h); ctx.fill();
      }
      ctx.fillStyle = '#e040fb'; ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.fillText('↓ 滑铲', obs.x + obs.w/2, obs.y - 5);
    } else {
      const isTall = obs.type === 'tall';
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(obs.x + 3, obs.y + 3, obs.w, obs.h);
      ctx.fillStyle = isTall ? '#1a1a1a' : '#222'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = isTall ? '#ff1744' : '#e53935'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = '#c62828'; const sw = 6;
      for (let sx = obs.x; sx < obs.x + obs.w; sx += sw * 2) ctx.fillRect(sx, obs.y, Math.min(sw, obs.x + obs.w - sx), isTall ? 8 : 6);
      ctx.fillStyle = '#d32f2f';
      for (let sx = obs.x; sx < obs.x + obs.w; sx += 10) { ctx.beginPath(); ctx.moveTo(sx, obs.y); ctx.lineTo(sx + 5, obs.y - 7); ctx.lineTo(sx + 10, obs.y); ctx.fill(); }
    }
  }

  // Coins
  for (const coin of coins) {
    if (coin.collected) continue;
    if (coin.x < visLeft - 30 || coin.x > visRight) continue;
    const cx = coin.x, cy = coin.y;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffcc00'; ctx.fillRect(cx - 7, cy - 7, 14, 14);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff9c4'; ctx.fillRect(cx - 3, cy - 5, 6, 6);
    ctx.fillStyle = '#b8860b'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.fillText('$', cx, cy + 3);
  }

  // Goose
  const gooseScreenX = goose.x - camera.x;
  if (gooseScreenX > -60 && gooseScreenX < W + 40) {
    const gx = goose.x, gy = GROUND_Y - GOOSE_SIZE, gw = GOOSE_SIZE, gh = GOOSE_SIZE;
    const gDist = player.x - goose.x, angry = gDist < 120;
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = angry ? 28 : 16;
    ctx.fillStyle = angry ? '#d32f2f' : '#e53935'; ctx.fillRect(gx, gy, gw, gh);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 3; ctx.strokeRect(gx, gy, gw, gh);
    ctx.fillStyle = '#fff'; ctx.fillRect(gx + 7, gy + 7, 8, 8); ctx.fillRect(gx + 21, gy + 7, 8, 8);
    ctx.fillStyle = '#000';
    const eyeX = angry ? 3 : 0;
    ctx.fillRect(gx + 10 + eyeX, gy + 10, 4, 4); ctx.fillRect(gx + 24 + eyeX, gy + 10, 4, 4);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(gx + 7, gy + (angry ? 4 : 5)); ctx.lineTo(gx + 15, gy + 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx + 29, gy + (angry ? 4 : 5)); ctx.lineTo(gx + 21, gy + 8); ctx.stroke();
    ctx.fillStyle = angry ? '#f44336' : '#ff9800';
    ctx.beginPath(); ctx.moveTo(gx + 36, gy + 13); ctx.lineTo(gx + (angry ? 54 : 50), gy + 18); ctx.lineTo(gx + 36, gy + 23); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center'; ctx.fillText('TCAMP', gx + gw/2, gy - 4);
    if (angry) {
      ctx.strokeStyle = '#ff444488'; ctx.lineWidth = 1;
      for (let l = 0; l < 3; l++) { const lx = gx - 8 - l * 6; ctx.beginPath(); ctx.moveTo(lx, gy); ctx.lineTo(lx - 10, gy); ctx.stroke(); ctx.beginPath(); ctx.moveTo(lx, gy + gh); ctx.lineTo(lx - 10, gy + gh); ctx.stroke(); }
    }
  }

  // Player
  const pitFade = player.pitFalling > 0 ? (player.pitFalling / 45) : 1;
  ctx.globalAlpha = pitFade;
  if (player.pitFalling > 0) {
    const s = 0.5 + pitFade * 0.5, fx = player.x + player.w * (1 - s) / 2, fy = player.y + player.h * (1 - s);
    ctx.fillStyle = '#555'; ctx.fillRect(fx, fy, player.w * s, player.h * s);
    ctx.fillStyle = '#ff444488'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.fillText('😱', player.x + player.w / 2, player.y + player.h / 2 + 6);
  } else if (player.sliding) {
    const slideY = GROUND_Y - 16;
    ctx.fillStyle = '#ffffff44'; ctx.fillRect(player.x - 4, slideY + 10, 8, 6); ctx.fillRect(player.x + player.w - 4, slideY + 10, 8, 6);
    ctx.fillStyle = '#42a5f5'; ctx.fillRect(player.x, slideY, player.w + 6, 14);
    ctx.strokeStyle = '#90caf9'; ctx.lineWidth = 2; ctx.strokeRect(player.x, slideY, player.w + 6, 14);
    ctx.fillStyle = '#fff'; ctx.fillRect(player.x + 3, slideY + 2, 7, 7); ctx.fillRect(player.x + 20, slideY + 2, 7, 7);
    ctx.fillStyle = '#000'; ctx.fillRect(player.x + 5, slideY + 4, 3, 3); ctx.fillRect(player.x + 22, slideY + 4, 3, 3);
    ctx.fillStyle = '#42a5f544'; ctx.fillRect(player.x - 16, slideY + 4, 16, 6);
  } else {
    const stumbleFlash = player.stumble > 0 && Math.floor(player.stumble / 4) % 2 === 0;
    const bobY = player.onGround ? Math.abs(Math.sin(player.runFrame * 0.25)) * 3 : 0;
    const stBob = player.stumble > 0 ? Math.abs(Math.sin(player.stumble * 0.5)) * 8 : 0;
    const pColor = stumbleFlash ? '#ff8844' : '#42a5f5', pStroke = stumbleFlash ? '#ffaa66' : '#90caf9';
    ctx.fillStyle = pColor; ctx.fillRect(player.x, player.y - bobY - stBob, player.w, player.h);
    ctx.strokeStyle = pStroke; ctx.lineWidth = 3; ctx.strokeRect(player.x, player.y - bobY - stBob, player.w, player.h);
    if (player.stumble > 0 && stumbleFlash) {
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(player.x + 5, player.y + 7); ctx.lineTo(player.x + 13, player.y + 15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(player.x + 13, player.y + 7); ctx.lineTo(player.x + 5, player.y + 15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(player.x + 19, player.y + 7); ctx.lineTo(player.x + 27, player.y + 15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(player.x + 27, player.y + 7); ctx.lineTo(player.x + 19, player.y + 15); ctx.stroke();
    } else {
      ctx.fillStyle = '#fff'; ctx.fillRect(player.x + 5, player.y + 7 - bobY - stBob, 8, 8); ctx.fillRect(player.x + 19, player.y + 7 - bobY - stBob, 8, 8);
      ctx.fillStyle = '#000'; ctx.fillRect(player.x + 8, player.y + 10 - bobY - stBob, 4, 4); ctx.fillRect(player.x + 22, player.y + 10 - bobY - stBob, 4, 4);
    }
    if (player.stumble <= 0) { ctx.fillStyle = '#1565c0'; ctx.fillRect(player.x + 2, player.y - 7 - bobY, 28, 10); ctx.fillStyle = '#0d47a1'; ctx.fillRect(player.x + 18, player.y - 1 - bobY, 12, 4); }
    if (!player.onGround && player.jumpsUsed === 1) { ctx.fillStyle = '#ffffff66'; ctx.fillRect(player.x + 10, player.y - bobY + player.h + 4, 12, 4); }
  }
  ctx.globalAlpha = 1;

  // Trail
  for (const tp of trailParticles) { ctx.globalAlpha = tp.life / 26; ctx.fillStyle = '#90caf9'; ctx.fillRect(tp.x - tp.size/2, tp.y - tp.size/2, tp.size, tp.size); } ctx.globalAlpha = 1;
  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 60; ctx.fillStyle = p.color;
    if (p.type === 'flame') {
      ctx.beginPath(); ctx.moveTo(p.x, p.y - p.size); ctx.lineTo(p.x - p.size/2, p.y + p.size/2); ctx.lineTo(p.x + p.size/2, p.y + p.size/2); ctx.fill();
    } else {
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
  } ctx.globalAlpha = 1;
  // Popups
  for (const p of popups) { ctx.globalAlpha = p.life / 40; ctx.fillStyle = p.color; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.fillText(p.text, p.x - camera.x, p.y); } ctx.globalAlpha = 1;

  ctx.restore();

  // ===== HUD =====
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, 56);
  ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'left';
  ctx.fillText('⭐ ' + score + '  (' + distanceScore + 'm)', 16, 34);
  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 13px monospace';
  const atCap = playerSpeed >= SPEED_CAP - 0.01;
  ctx.fillText('💰 ' + coinCount + '  |  速度 ' + playerSpeed.toFixed(1) + 'x' + (atCap ? ' 🔒MAX' : ''), 16, 52);

  // Goose distance (prominent)
  const gap = Math.floor(player.x - goose.x);
  ctx.font = 'bold 16px monospace'; ctx.textAlign = 'right';
  ctx.fillStyle = gap < 50 ? '#ff4444' : gap < 150 ? '#ffcc00' : '#4caf50';
  const gapIcon = gap < 50 ? '⚠ ' : gap < 150 ? '' : '';
  ctx.fillText(gapIcon + '距鹅: ' + gap + 'm', W - 16, 34);
  ctx.fillStyle = '#aaa'; ctx.font = '12px monospace';
  ctx.fillText('里程碑: ' + (Math.floor(player.x / 1000) * 100) + 'm', W - 16, 52);

  // Combo HUD
  if (gameState === 'playing' && combo >= 5) {
    const cLevel = combo >= 20 ? 3 : combo >= 10 ? 2 : 1;
    const cColor = cLevel === 3 ? '#ff4444' : cLevel === 2 ? '#ffaa00' : '#4caf50';
    const cSize  = cLevel === 3 ? 24 : cLevel === 2 ? 20 : 16;
    const cLabel = cLevel === 3 ? ' UNSTOPPABLE!' : cLevel === 2 ? ' On Fire!' : ' Combo!';
    ctx.fillStyle = cColor;
    ctx.font = 'bold ' + cSize + 'px monospace'; ctx.textAlign = 'right';
    ctx.fillText(combo + 'x' + cLabel, W - 16, 72);
  }

  // Combo FX pop — big floating text with scale bounce. Lasts 2 full seconds.
  if (gameState === 'playing' && comboFx) {
    const ft = comboFx.timer / 120;              // 1.0 → 0.0
    // Scale: 0.4→1.3 in first 0.3s, then settle to 1.0
    const fScale = ft > 0.75 ? 0.4 + (1 - ft) * 3.6 : 1.0;
    // Alpha: full for first 0.7s, then fade out over remaining 0.5s
    const fAlpha = ft > 0.4 ? 1.0 : ft / 0.4;
    const fColor = comboFx.tier === 3 ? '#ff4444' : comboFx.tier === 2 ? '#ffaa00' : '#4caf50';
    const fText  = comboFx.tier === 3 ? '🔥 UNSTOPPABLE! 🔥' : comboFx.tier === 2 ? 'ON FIRE!' : 'NICE!';
    const fSize  = comboFx.tier === 3 ? 42 : comboFx.tier === 2 ? 32 : 26;
    ctx.save();
    ctx.globalAlpha = fAlpha;
    ctx.fillStyle = fColor;
    ctx.font = 'bold ' + fSize + 'px monospace';
    ctx.textAlign = 'center';
    ctx.translate(W/2, H/2 - 40);
    ctx.scale(fScale, fScale);
    ctx.fillText(fText, 0, 0);
    ctx.restore();

    // Corner pulse
    if (comboFx.tier >= 2) {
      const cp = comboFx.tier === 3 ? 1 : 0.6;
      const ca = fAlpha * cp;
      const cw = comboFx.tier === 3 ? 80 : 50;
      ctx.fillStyle = 'rgba(' + (comboFx.tier === 3 ? '255,68,68' : '255,170,0') + ',' + ca + ')';
      ctx.fillRect(0, 0, cw, 6); ctx.fillRect(W - cw, 0, cw, 6);
      ctx.fillRect(0, H - 6, cw, 6); ctx.fillRect(W - cw, H - 6, cw, 6);
      ctx.fillRect(0, 0, 6, cw); ctx.fillRect(W - 6, 0, 6, cw);
      ctx.fillRect(0, H - cw, 6, cw); ctx.fillRect(W - 6, H - cw, 6, cw);
    }
  }

  // Control hint
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
  ctx.fillText('Space 跳跃(长按更高/二段跳) | S 滑铲 | R 重来', W / 2, H - 10);

  // Screen shake + vignette
  const gooseDist = player.x - goose.x;
  let shakeX = 0, shakeY = 0;
  const totalShake = screenShake + (comboShake || 0);
  if (gooseDist < 100 && totalShake > 0) { shakeX = (Math.random() - 0.5) * totalShake * 2; shakeY = (Math.random() - 0.5) * totalShake * 2; }
  if (gooseDist < 300 && gameState === 'playing') {
    const danger = 1 - Math.min(1, Math.max(0, gooseDist) / 300);
    const vg = ctx.createRadialGradient(W/2 + shakeX, H/2 + shakeY, W * 0.5, W/2, H/2, W * 0.8);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(255,0,0,' + (danger * 0.35) + ')');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
    if (gooseDist < 80) { ctx.fillStyle = '#ff4444'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center'; ctx.fillText('⚠ 要被追上了! ⚠', W/2 + shakeX, H/2 + 120 + shakeY); }
  }

  // Overlays
  if (gameState === 'waiting') {
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 42px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Tcamp 鹅追击', W / 2, H / 2 - 100);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText('无限跑酷 — 躲开障碍，逃离大鹅的追击!', W / 2, H / 2 - 45);
    ctx.fillText('Space = 跳跃 (长按更高/二段跳)   S = 滑铲', W / 2, H / 2 - 18);
    ctx.fillText('🟦 小障碍   🟥 大障碍   🟪 横梁(滑铲!)   ⬛ 深坑', W / 2, H / 2 + 12);
    if (highScore > 0) { ctx.fillStyle = '#ffd700'; ctx.font = 'bold 18px monospace'; ctx.fillText('🏆 最高记录: ' + highScore + '  (' + Math.floor(highScore) + 'm)', W / 2, H / 2 + 48); }
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 20px monospace';
    ctx.fillText('按 Space 或 点击屏幕 开始', W / 2, H / 2 + (highScore > 0 ? 80 : 60));
  }
  if (gameState === 'countdown') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, W, H);
    const sec = Math.ceil(countdownTimer / 60);
    ctx.fillStyle = sec <= 1 ? '#ff4444' : '#fff'; ctx.font = 'bold 80px monospace'; ctx.textAlign = 'center';
    ctx.fillText(sec, W / 2, H / 2);
  }
  if (gameState === 'over') {
    drawGameOver();
  }
}

function drawGameOver() {
  var isNewRecord = (score >= highScore && score > 0);
  var rank = getRank(distanceScore);
  var yOffset = 0;

  // Check if we need more vertical space for leaderboard
  var showLB = leaderboardState !== 'hidden';

  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  if (showLB) {
    // Scrollable card layout
    yOffset = 0;
    // ====== GIANT DISTANCE ======
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 72px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(distanceScore + 'm', W / 2, 90);

    // Subtitle
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('你跑了', W / 2, 60);

    // Rank badge
    ctx.fillStyle = rank.color;
    ctx.font = 'bold 16px monospace';
    ctx.fillText(rank.emoji + ' ' + rank.name + '段位 ' + rank.emoji, W / 2, 112);

    // Score line
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('⭐ ' + score + '分', W / 2, 132);

    if (isNewRecord) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 16px monospace';
      ctx.fillText('🏆 新纪录! 🏆', W / 2, 152);
    }

    // ====== STATS ROW ======
    var statsY = isNewRecord ? 172 : 150;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(40, statsY, W - 80, 56);

    ctx.font = '13px monospace';
    statsY += 18;
    // Left column
    ctx.fillStyle = '#aaa'; ctx.textAlign = 'left';
    ctx.fillText('最高连击', 60, statsY);
    ctx.fillStyle = '#fff';
    ctx.fillText(runStats.maxCombo + 'x', 60, statsY + 18);

    ctx.fillStyle = '#aaa';
    ctx.fillText('跳跃次数', 190, statsY);
    ctx.fillStyle = '#fff';
    ctx.fillText('' + runStats.jumps, 190, statsY + 18);

    ctx.fillStyle = '#aaa';
    ctx.fillText('收集金币', 320, statsY);
    ctx.fillStyle = '#fff';
    ctx.fillText('' + runStats.coinsCollected, 320, statsY + 18);

    // Right column
    ctx.fillStyle = '#aaa';
    ctx.fillText('撞墙', 450, statsY);
    ctx.fillStyle = '#fff';
    ctx.fillText(runStats.wallHits + '次', 450, statsY + 18);

    ctx.fillStyle = '#aaa';
    ctx.fillText('掉坑', 550, statsY);
    ctx.fillStyle = '#fff';
    ctx.fillText(runStats.pitsFallen + '次', 550, statsY + 18);

    ctx.fillStyle = '#aaa';
    ctx.fillText('速度', 680, statsY);
    ctx.fillStyle = '#fff';
    ctx.fillText(playerSpeed.toFixed(1) + 'x', 680, statsY + 18);

    // ====== LEADERBOARD ======
    var lbY = statsY + 50;
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('🏆 排行榜 (Top 10)', W / 2, lbY);
    lbY += 18;

    // Draw leaderboard entries or empty state
    var entryH = 20;
    if (leaderboard.length === 0) {
      ctx.fillStyle = '#666';
      ctx.font = '13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('(暂无记录 — 等你上榜!)', W / 2, lbY + entryH);
    }
    for (var i = 0; i < leaderboard.length; i++) {
      var e = leaderboard[i];
      var ey = lbY + i * entryH;
      var medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '.';
      ctx.textAlign = 'left';
      ctx.fillStyle = i < 3 ? '#ffcc00' : '#ccc';
      ctx.font = '13px monospace';
      ctx.fillText(medal, 60, ey);
      ctx.fillText(e.name || '???', 110, ey);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'right';
      ctx.fillText(e.dist + 'm', W - 160, ey);
      ctx.fillStyle = '#888';
      ctx.fillText(e.score + '分', W - 60, ey);
    }

    var finalY = lbY + Math.max(leaderboard.length, 1) * entryH + 24;

    // Name input if qualifying
    if (leaderboardState === 'input') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(W / 2 - 160, finalY - 20, 320, 50);
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 15px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('上榜! 输入名字:', W / 2, finalY);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px monospace';
      ctx.fillText((lbNameInput || '___') + (Date.now() % 800 < 400 ? '|' : ''), W / 2, finalY + 22);
      ctx.fillStyle = '#888';
      ctx.font = '11px monospace';
      ctx.fillText('Enter确认  Esc跳过', W / 2, finalY + 38);
      finalY += 48;
    }

    // Restart hint
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('按 R 重新挑战', W / 2, finalY + 10);
    return;
  }

  // ===== Compact mode (no leaderboard, just stats + rank) =====
  // GIANT DISTANCE — centered, huge
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 80px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(distanceScore + 'm', W / 2, H / 2 - 10);

  // "你跑了"
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('你跑了', W / 2, H / 2 - 58);

  // Rank
  ctx.fillStyle = rank.color;
  ctx.font = 'bold 16px monospace';
  ctx.fillText(rank.emoji + ' ' + rank.name + '段位', W / 2, H / 2 + 18);

  // Score
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('⭐ ' + score + '分', W / 2, H / 2 + 40);

  if (isNewRecord) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('🏆 新纪录! 🏆', W / 2, H / 2 + 62);
  }

  // Stats compact row
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(80, H / 2 + 80, W - 160, 40);
  ctx.font = '12px monospace';
  ctx.fillStyle = '#aaa'; ctx.textAlign = 'left';
  var sx = 100;
  var sy = H / 2 + 98;
  ctx.fillText('连击' + runStats.maxCombo + 'x', sx, sy); sx += 100;
  ctx.fillText('跳跃' + runStats.jumps, sx, sy); sx += 100;
  ctx.fillText('金币' + runStats.coinsCollected, sx, sy); sx += 100;
  ctx.fillText('撞墙' + runStats.wallHits, sx, sy); sx += 100;
  ctx.fillText('掉坑' + runStats.pitsFallen, sx, sy);

  // Restart
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('按 R 重新挑战', W / 2, H / 2 + 148);
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
reset(); gameLoop();
</script>
</body>
</html>
