<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Tcamp 鹅追击</title>
<style>
  body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { border: 2px solid #444; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 800, H = 600;
const GROUND_Y = 500;
const PLAYER_SIZE = 32;
const GOOSE_SIZE = 36;
const PORTAL_SIZE = 44;
const MAP_WIDTH = 4200;
const BASE_SPEED = 2.0;
const SPEED_BOOST_PER_TIER = 0.25;
let playerSpeed = BASE_SPEED;

// --- Game state ---
let player, goose, obstacles, coins, portal, camera, gameState, countdownTimer, particles;
let score, distanceScore, coinCount, coinScore, speedTier;
let jumpRequested = 0; // Jump buffer: 0-2 pending jumps
let spaceWasDown = false;

function reset() {
  playerSpeed = BASE_SPEED;
  player = {
    x: 100, y: GROUND_Y - PLAYER_SIZE, w: PLAYER_SIZE, h: PLAYER_SIZE,
    vy: 0, onGround: true, runFrame: 0, coyoteTimer: 0,
    doubleJumped: false,
    sliding: false, slideTimer: 0,
    jumpHeld: false, jumpsUsed: 0 // 0=no jump yet, 1=one jump used, 2=both jumps used
  };
  goose = { x: -500, y: GROUND_Y - GOOSE_SIZE, w: GOOSE_SIZE, h: GOOSE_SIZE, speed: 1.4 };
  jumpRequested = 0;
  spaceWasDown = false;

  obstacles = [
    { x: 600,  y: GROUND_Y - 22, w: 28, h: 22, type: 'small' },
    { x: 950,  y: GROUND_Y - 46, w: 50, h: 14, type: 'beam'  },
    { x: 1300, y: GROUND_Y - 44, w: 30, h: 44, type: 'tall'  },
    { x: 1650, y: 0,               w: 70, h: 0,  type: 'pit'   },
    { x: 2100, y: GROUND_Y - 46, w: 55, h: 14, type: 'beam'  },
    { x: 2550, y: GROUND_Y - 44, w: 30, h: 44, type: 'tall'  },
    { x: 2850, y: 0,               w: 60, h: 0,  type: 'pit'   },
    { x: 3200, y: GROUND_Y - 22, w: 28, h: 22, type: 'small' },
    { x: 3550, y: GROUND_Y - 46, w: 50, h: 14, type: 'beam'  },
    { x: 3850, y: 0,               w: 65, h: 0,  type: 'pit'   },
  ];

  coins = [
    { x: 380,  y: GROUND_Y - 50, collected: false },
    { x: 750,  y: GROUND_Y - 40, collected: false },
    { x: 800,  y: GROUND_Y - 40, collected: false },
    { x: 1100, y: GROUND_Y - 40, collected: false },
    { x: 1150, y: GROUND_Y - 40, collected: false },
    { x: 1500, y: GROUND_Y - 40, collected: false },
    { x: 1850, y: GROUND_Y - 40, collected: false },
    { x: 1950, y: GROUND_Y - 40, collected: false },
    { x: 2350, y: GROUND_Y - 40, collected: false },
    { x: 2700, y: GROUND_Y - 40, collected: false },
    { x: 3050, y: GROUND_Y - 40, collected: false },
    { x: 3400, y: GROUND_Y - 40, collected: false },
    { x: 610,  y: GROUND_Y - 70, collected: false },
    { x: 1310, y: GROUND_Y - 90, collected: false },
    { x: 2560, y: GROUND_Y - 90, collected: false },
    { x: 3210, y: GROUND_Y - 70, collected: false },
    { x: 965,  y: GROUND_Y - 20, collected: false },
    { x: 985,  y: GROUND_Y - 20, collected: false },
    { x: 2120, y: GROUND_Y - 20, collected: false },
    { x: 2140, y: GROUND_Y - 20, collected: false },
    { x: 3565, y: GROUND_Y - 20, collected: false },
    { x: 3585, y: GROUND_Y - 20, collected: false },
    { x: 1675, y: GROUND_Y - 90,  collected: false },
    { x: 1700, y: GROUND_Y - 115, collected: false },
    { x: 1725, y: GROUND_Y - 90,  collected: false },
    { x: 2875, y: GROUND_Y - 90,  collected: false },
    { x: 2900, y: GROUND_Y - 115, collected: false },
    { x: 2925, y: GROUND_Y - 90,  collected: false },
    { x: 3875, y: GROUND_Y - 90,  collected: false },
    { x: 3900, y: GROUND_Y - 115, collected: false },
    { x: 3925, y: GROUND_Y - 90,  collected: false },
  ];

  portal = { x: MAP_WIDTH - 80, y: GROUND_Y - PORTAL_SIZE, w: PORTAL_SIZE, h: PORTAL_SIZE, glow: 0 };
  camera = { x: 0 };
  gameState = 'waiting';
  countdownTimer = 0;
  particles = [];
  popups = [];
  score = 0;
  distanceScore = 0;
  coinScore = 0;
  coinCount = 0;
  speedTier = 0;
}

let popups = [];
function addPopup(x, y, text, color) {
  popups.push({ x, y, text, color, life: 40, vy: -2 });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 1) * 8,
      life: 40 + Math.random() * 20,
      color,
      size: 2 + Math.random() * 4
    });
  }
}

// ===================== INPUT =====================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'r' || e.key === 'R') reset();
  if (gameState === 'waiting' && (e.key === ' ' || e.key === 'Space')) {
    gameState = 'countdown'; countdownTimer = 90;
  }
  if ((e.key === ' ' || e.key === 'Space') && gameState === 'playing') {
    player.jumpHeld = true;
    if (!spaceWasDown) jumpRequested = Math.min(jumpRequested + 1, 2);
    spaceWasDown = true;
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  if ((e.key === ' ' || e.key === 'Space')) {
    spaceWasDown = false;
    if (gameState === 'playing') {
      player.jumpHeld = false;
      if (player.vy < -3) player.vy = -3;
    }
  }
  e.preventDefault();
});
canvas.addEventListener('click', () => {
  if (gameState === 'waiting') { gameState = 'countdown'; countdownTimer = 90; }
  if (gameState === 'playing') jumpRequested = Math.min(jumpRequested + 1, 2);
});

// ===================== COLLISION =====================
function collides(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ===================== UPDATE =====================
function update() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i]; p.y += p.vy; p.life--;
    if (p.life <= 0) popups.splice(i, 1);
  }

  if (gameState === 'countdown') { countdownTimer--; if (countdownTimer <= 0) gameState = 'playing'; return; }
  if (gameState !== 'playing') return;

  const progressRatio = Math.min(player.x / MAP_WIDTH, 1);
  const newTier = Math.floor(progressRatio * 5);
  if (newTier > speedTier) {
    speedTier = newTier;
    playerSpeed = BASE_SPEED + speedTier * SPEED_BOOST_PER_TIER;
    addPopup(player.x, player.y - 40, '加速!', '#ffcc00');
  }

  player.x += playerSpeed;
  player.runFrame++;
  distanceScore = Math.floor(player.x / 10);
  score = distanceScore + coinScore;

  // ---- Slide ----
  const wantSlide = (keys['s'] || keys['S']) && player.onGround && !player.sliding;
  if (wantSlide) { player.sliding = true; player.slideTimer = 22; }
  if (player.sliding) {
    player.slideTimer--;
    player.h = 16; player.y = GROUND_Y - player.h;
    if (player.slideTimer <= 0) { player.sliding = false; player.h = PLAYER_SIZE; player.y = GROUND_Y - player.h; }
  } else if (player.onGround) {
    player.h = PLAYER_SIZE;
  }

  // ===== BRAND NEW JUMP SYSTEM =====
  // Process jump buffer: each request consumes one "jump credit"
  while (jumpRequested > 0 && player.jumpsUsed < 2) {
    const power = player.jumpsUsed === 0 ? -12 : -9;
    player.vy = power;
    player.onGround = false;
    player.coyoteTimer = 0;
    player.doubleJumped = (player.jumpsUsed === 1);
    player.jumpHeld = true;
    player.jumpsUsed++;
    jumpRequested--;

    if (player.jumpsUsed === 2) {
      spawnParticles(player.x + player.w/2, player.y + player.h, '#fff', 12);
      addPopup(player.x, player.y - 20, '二段跳!', '#90caf9');
    }
  }
  // If holding Space and not rising, don't keep requesting jumps
  // (spaceWasDown prevents auto-repeat from adding more requests)

  // Variable-height: release early → short hop
  if (!player.jumpHeld && player.vy < -3) {
    player.vy = -3;
  }

  // Gravity
  player.vy += 0.45;
  player.y += player.vy;

  // Ground collision — resets jumpsUsed
  if (player.y >= GROUND_Y - player.h) {
    player.y = GROUND_Y - player.h;
    player.vy = 0;
    player.onGround = true;
    player.coyoteTimer = 0;
    player.jumpsUsed = 0;
    player.doubleJumped = false;
    if (!player.sliding) player.h = PLAYER_SIZE;
  } else if (player.onGround && player.vy > 0) {
    player.onGround = false;
    player.coyoteTimer = 7;
  }

  // Coyote time: if request comes while falling off a ledge
  if (jumpRequested > 0 && player.jumpsUsed === 0 && player.coyoteTimer > 0) {
    player.vy = -12;
    player.onGround = false;
    player.coyoteTimer = 0;
    player.doubleJumped = false;
    player.jumpHeld = true;
    player.jumpsUsed = 1;
    jumpRequested--;
  }
  if (player.coyoteTimer > 0 && player.jumpsUsed > 0) player.coyoteTimer--;
  if (player.coyoteTimer > 0 && player.jumpsUsed === 0) player.coyoteTimer--;

  // Pit death
  for (const obs of obstacles) {
    if (obs.type === 'pit') {
      const pHoriz = player.x + player.w > obs.x && player.x < obs.x + obs.w;
      if (pHoriz && player.y >= GROUND_Y - player.h && player.vy >= 0) {
        spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 30);
        gameState = 'over'; return;
      }
    }
  }

  if (player.x < 100) player.x = 100;

  const gooseSpeed = goose.speed + progressRatio * 0.6;
  goose.x += gooseSpeed;
  portal.glow = (portal.glow + 0.05) % (Math.PI * 2);

  // Coin collection
  for (const coin of coins) {
    if (coin.collected) continue;
    const cBox = { x: coin.x - 8, y: coin.y - 8, w: 16, h: 16 };
    if (collides(player, cBox)) {
      coin.collected = true; coinScore += 10; coinCount++;
      addPopup(coin.x, coin.y - 10, '+10', '#ffcc00');
      spawnParticles(coin.x, coin.y, '#ffd700', 6);
    }
  }

  // Camera
  const targetCamX = player.x - W / 3;
  camera.x += (targetCamX - camera.x) * 0.12;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > MAP_WIDTH - W) camera.x = MAP_WIDTH - W;

  // Collision with obstacles
  for (const obs of obstacles) {
    if (obs.type === 'pit') continue;
    const margin = 6;
    const pBox = { x: player.x + margin, y: player.y + margin, w: player.w - margin*2, h: player.h - margin*2 };
    let oBox;
    if (obs.type === 'beam') {
      if (player.sliding) continue;
      oBox = { x: obs.x + 2, y: obs.y + 1, w: obs.w - 4, h: obs.h - 1 };
    } else {
      oBox = { x: obs.x + 3, y: obs.y + 2, w: obs.w - 6, h: obs.h - 2 };
    }
    if (collides(pBox, oBox)) {
      spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 30);
      gameState = 'over'; return;
    }
  }

  // Goose collision
  const pMargin = 4, gMargin = 4;
  const pBox2 = { x: player.x + pMargin, y: player.y + pMargin, w: player.w - pMargin*2, h: player.h - pMargin*2 };
  const gBox = { x: goose.x + gMargin, y: goose.y + 3, w: goose.w - gMargin*2, h: goose.h - 3 };
  if (collides(pBox2, gBox)) {
    spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 30);
    gameState = 'over'; return;
  }

  if (collides(player, portal)) {
    spawnParticles(player.x + player.w/2, player.y + player.h/2, '#00ff88', 40);
    gameState = 'victory'; return;
  }
  if (player.x > MAP_WIDTH + 60 || player.y > H + 60) { gameState = 'over'; return; }
}

// ===================== RENDER =====================
function draw() {
  ctx.clearRect(0, 0, W, H);

  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0a0a1a'); sky.addColorStop(0.5, '#1a1a3e'); sky.addColorStop(1, '#3a2a5c');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  ctx.save(); ctx.translate(-camera.x * 0.3, 0);
  ctx.fillStyle = '#ffffff33';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137 + 42) % MAP_WIDTH);
    const sy = ((i * 251 + 42) % (GROUND_Y - 60));
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.restore();

  ctx.save(); ctx.translate(-camera.x * 0.5, 0);
  ctx.fillStyle = '#1e1e3a';
  for (let i = 0; i < 8; i++) {
    const mx = i * 500;
    ctx.beginPath(); ctx.moveTo(mx - 120, GROUND_Y); ctx.lineTo(mx + 60, GROUND_Y - 180); ctx.lineTo(mx + 240, GROUND_Y); ctx.fill();
  }
  ctx.restore();

  ctx.save(); ctx.translate(-camera.x, 0);

  // Ground
  ctx.fillStyle = '#2a2a4a'; ctx.fillRect(0, GROUND_Y, MAP_WIDTH, H - GROUND_Y);
  ctx.fillStyle = '#3d3d6b'; ctx.fillRect(0, GROUND_Y, MAP_WIDTH, 4);
  ctx.strokeStyle = '#333360'; ctx.lineWidth = 1;
  for (let gx = 0; gx < MAP_WIDTH; gx += 80) {
    ctx.beginPath(); ctx.moveTo(gx, GROUND_Y + 4);
    ctx.lineTo(gx, GROUND_Y + 4 + ((gx / 80) % 3 === 0 ? 24 : 12)); ctx.stroke();
  }

  // Pits
  for (const obs of obstacles) {
    if (obs.type !== 'pit') continue;
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(obs.x, GROUND_Y, obs.w, H - GROUND_Y);
    ctx.fillStyle = '#ff444466'; ctx.fillRect(obs.x, GROUND_Y, 3, H - GROUND_Y);
    ctx.fillRect(obs.x + obs.w - 3, GROUND_Y, 3, H - GROUND_Y);
    ctx.fillStyle = '#ff4444'; ctx.font = '18px monospace'; ctx.textAlign = 'center';
    ctx.fillText('▼ 坑 ▼', obs.x + obs.w/2, GROUND_Y - 10 + Math.sin(Date.now() * 0.005) * 4);
  }

  // Solid obstacles & beams
  for (const obs of obstacles) {
    if (obs.type === 'pit') continue;
    if (obs.type === 'beam') {
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(obs.x + 2, obs.y + 2, obs.w, obs.h);
      ctx.fillStyle = '#7b1fa2'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = '#e040fb'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = '#4a0072'; const bsw = 8;
      for (let sx = obs.x; sx < obs.x + obs.w; sx += bsw * 2) ctx.fillRect(sx, obs.y, Math.min(bsw, obs.x + obs.w - sx), obs.h);
      ctx.fillStyle = '#e040fb';
      for (let sx = obs.x + 5; sx < obs.x + obs.w - 5; sx += 12) {
        ctx.beginPath(); ctx.moveTo(sx, obs.y + obs.h); ctx.lineTo(sx + 4, obs.y + obs.h + 10); ctx.lineTo(sx + 8, obs.y + obs.h); ctx.fill();
      }
      ctx.fillStyle = '#e040fb'; ctx.font = '13px monospace'; ctx.textAlign = 'center';
      ctx.fillText('↓ 滑铲 ↓', obs.x + obs.w/2, obs.y - 6);
      continue;
    }
    const isTall = obs.type === 'tall';
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(obs.x + 3, obs.y + 3, obs.w, obs.h);
    ctx.fillStyle = isTall ? '#1a1a1a' : '#222'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    ctx.strokeStyle = isTall ? '#ff1744' : '#e53935'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    ctx.fillStyle = '#c62828'; const stripeW = 6;
    for (let sx = obs.x; sx < obs.x + obs.w; sx += stripeW * 2) ctx.fillRect(sx, obs.y, Math.min(stripeW, obs.x + obs.w - sx), isTall ? 8 : 6);
    ctx.fillStyle = '#d32f2f';
    for (let sx = obs.x; sx < obs.x + obs.w; sx += 10) {
      ctx.beginPath(); ctx.moveTo(sx, obs.y); ctx.lineTo(sx + 5, obs.y - 7); ctx.lineTo(sx + 10, obs.y); ctx.fill();
    }
  }

  // Coins
  for (const coin of coins) {
    if (coin.collected) continue;
    const cx = coin.x, cy = coin.y;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffcc00'; ctx.fillRect(cx - 7, cy - 7, 14, 14);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff9c4'; ctx.fillRect(cx - 3, cy - 5, 6, 6);
    ctx.fillStyle = '#b8860b'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
    ctx.fillText('$', cx, cy + 3);
  }

  // Portal
  const glowAlpha = 0.3 + Math.sin(portal.glow) * 0.2;
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 14 + Math.sin(portal.glow) * 8;
  ctx.fillStyle = '#00e676'; ctx.fillRect(portal.x, portal.y, portal.w, portal.h);
  ctx.shadowBlur = 0;
  ctx.fillStyle = `rgba(0,255,136,${glowAlpha})`; ctx.fillRect(portal.x - 4, portal.y - 4, portal.w + 8, portal.h + 8);
  ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 3; ctx.strokeRect(portal.x, portal.y, portal.w, portal.h);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
  ctx.fillText('毕业', portal.x + portal.w/2, portal.y + portal.h/2 - 3);
  ctx.fillText('🚪', portal.x + portal.w/2, portal.y + portal.h/2 + 16);

  // Goose
  const gooseScreenX = goose.x - camera.x;
  if (gooseScreenX < W + 100) {
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#e53935'; ctx.fillRect(goose.x, goose.y, goose.w, goose.h);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 3; ctx.strokeRect(goose.x, goose.y, goose.w, goose.h);
    ctx.fillStyle = '#fff'; ctx.fillRect(goose.x + 7, goose.y + 7, 8, 8); ctx.fillRect(goose.x + 21, goose.y + 7, 8, 8);
    ctx.fillStyle = '#000'; ctx.fillRect(goose.x + 10, goose.y + 10, 4, 4); ctx.fillRect(goose.x + 24, goose.y + 10, 4, 4);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(goose.x + 7, goose.y + 5); ctx.lineTo(goose.x + 15, goose.y + 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(goose.x + 29, goose.y + 5); ctx.lineTo(goose.x + 21, goose.y + 8); ctx.stroke();
    ctx.fillStyle = '#ff9800';
    ctx.beginPath(); ctx.moveTo(goose.x + 36, goose.y + 13); ctx.lineTo(goose.x + 50, goose.y + 18); ctx.lineTo(goose.x + 36, goose.y + 23); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('TCAMP', goose.x + goose.w/2, goose.y - 4);
  }

  // Player
  if (player.sliding) {
    const slideY = GROUND_Y - 16;
    ctx.fillStyle = '#ffffff44'; ctx.fillRect(player.x - 4, slideY + 10, 8, 6);
    ctx.fillRect(player.x + player.w - 4, slideY + 10, 8, 6);
    ctx.fillStyle = '#42a5f5'; ctx.fillRect(player.x, slideY, player.w + 6, 14);
    ctx.strokeStyle = '#90caf9'; ctx.lineWidth = 2; ctx.strokeRect(player.x, slideY, player.w + 6, 14);
    ctx.fillStyle = '#fff'; ctx.fillRect(player.x + 3, slideY + 2, 7, 7); ctx.fillRect(player.x + 20, slideY + 2, 7, 7);
    ctx.fillStyle = '#000'; ctx.fillRect(player.x + 5, slideY + 4, 3, 3); ctx.fillRect(player.x + 22, slideY + 4, 3, 3);
    ctx.fillStyle = '#42a5f544'; ctx.fillRect(player.x - 16, slideY + 4, 16, 6);
  } else {
    const bobY = player.onGround ? Math.abs(Math.sin(player.runFrame * 0.25)) * 3 : 0;
    ctx.fillStyle = '#42a5f5'; ctx.fillRect(player.x, player.y - bobY, player.w, player.h);
    ctx.strokeStyle = '#90caf9'; ctx.lineWidth = 3; ctx.strokeRect(player.x, player.y - bobY, player.w, player.h);
    ctx.fillStyle = '#fff'; ctx.fillRect(player.x + 5, player.y + 7 - bobY, 8, 8); ctx.fillRect(player.x + 19, player.y + 7 - bobY, 8, 8);
    ctx.fillStyle = '#000'; ctx.fillRect(player.x + 8, player.y + 10 - bobY, 4, 4); ctx.fillRect(player.x + 22, player.y + 10 - bobY, 4, 4);
    ctx.fillStyle = '#1565c0'; ctx.fillRect(player.x + 2, player.y - 7 - bobY, 28, 10);
    ctx.fillStyle = '#0d47a1'; ctx.fillRect(player.x + 18, player.y - 1 - bobY, 12, 4);
    // Double-jump indicator
    if (!player.onGround && player.jumpsUsed === 1) {
      ctx.fillStyle = '#ffffff66'; ctx.fillRect(player.x + 10, player.y - bobY + player.h + 4, 12, 4);
    }
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 60; ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Popups
  for (const p of popups) {
    ctx.globalAlpha = p.life / 40; ctx.fillStyle = p.color;
    ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x - camera.x, p.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ===== HUD =====
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, 52);
  ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`⭐ ${score}`, 16, 32);
  ctx.fillStyle = '#ffd700'; ctx.font = 'bold 14px monospace';
  ctx.fillText(`💰 ${coinCount}  (+${coinScore})`, 16, 50);
  ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'right';
  ctx.fillText(`距离 ${distanceScore}  |  速度 ${playerSpeed.toFixed(1)}x`, W - 16, 30);
  ctx.fillStyle = '#aaa';
  ctx.fillText(`鹅: ${Math.floor(goose.x)}m  |  进度 ${Math.floor(Math.min(player.x/MAP_WIDTH,1)*100)}%`, W - 16, 48);

  const prog = Math.min((player.x / MAP_WIDTH) * 100, 100);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(0, 56, W, 6);
  const barGrad = ctx.createLinearGradient(0, 0, W, 0);
  barGrad.addColorStop(0, '#42a5f5'); barGrad.addColorStop(0.7, '#7c4dff'); barGrad.addColorStop(1, '#00e676');
  ctx.fillStyle = barGrad; ctx.fillRect(0, 56, W * (prog / 100), 6);
  for (let t = 1; t <= 4; t++) {
    ctx.fillStyle = '#ffffff66'; ctx.fillRect((t / 5) * W - 1, 54, 2, 10);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
  ctx.fillText('Space 跳跃(长按更高/二段跳) | S 滑铲 | R 重来', W / 2, H - 10);

  // Jump-state debug (top-right)
  if (gameState === 'playing') {
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`跳跃次数:${player.jumpsUsed}/2  缓冲:${jumpRequested}`, W - 16, 72);
  }

  const gooseDist = goose.x - player.x;
  if (gooseDist < 200 && gameState === 'playing') {
    const danger = 1 - Math.max(0, gooseDist) / 200;
    ctx.fillStyle = `rgba(255,0,0,${danger * 0.12})`; ctx.fillRect(0, 0, W, H);
    if (gooseDist < 80) {
      ctx.fillStyle = '#ff4444'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center';
      ctx.fillText('⚠ 鹅来了! ⚠', W / 2, H / 2 + 120);
    }
  }

  // Overlays
  if (gameState === 'waiting') {
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 46px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Tcamp 鹅追击', W / 2, H / 2 - 110);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText('自动向右奔跑，收集金币，跑到传送门毕业!', W / 2, H / 2 - 50);
    ctx.fillText('Space = 跳跃 (长按更高 / 二段跳)   S = 滑铲', W / 2, H / 2 - 20);
    ctx.fillText('🟦 小障碍   🟥 大障碍   ⬛ 深坑   🟪 横梁(滑铲!)', W / 2, H / 2 + 10);
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 22px monospace';
    ctx.fillText('按 Space 或 点击屏幕 开始', W / 2, H / 2 + 65);
  }
  if (gameState === 'countdown') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, W, H);
    const sec = Math.ceil(countdownTimer / 60);
    ctx.fillStyle = sec <= 1 ? '#ff4444' : '#fff'; ctx.font = 'bold 80px monospace'; ctx.textAlign = 'center';
    ctx.fillText(sec, W / 2, H / 2);
  }
  if (gameState === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e53935'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 20px monospace';
    ctx.fillText(`最终得分: ${score}`, W / 2, H / 2 + 10);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText(`💰 金币 ${coinCount}  |  📏 距离 ${distanceScore}`, W / 2, H / 2 + 40);
    ctx.font = '18px monospace'; ctx.fillText('按 R 键重新挑战', W / 2, H / 2 + 75);
  }
  if (gameState === 'victory') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#00e676'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center';
    ctx.fillText('VICTORY!', W / 2, H / 2 - 40);
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 20px monospace';
    ctx.fillText(`最终得分: ${score}`, W / 2, H / 2 + 10);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText(`💰 金币 ${coinCount}  |  📏 距离 ${distanceScore}  |  🎓 毕业!`, W / 2, H / 2 + 40);
    ctx.font = '18px monospace'; ctx.fillText('按 R 键再来一局', W / 2, H / 2 + 75);
  }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
reset(); gameLoop();
</script>
</body>
</html>
